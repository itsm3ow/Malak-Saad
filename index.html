<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malak Saad Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Syne:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fce4ec;
            --main-pink: #f06292;
            --dark-pink: #ad1457;
            --text-color: #ec407a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #f8bbd0, #ffffff);
            font-family: 'Syne', sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            text-align: center;
            position: relative;
        }

        /* الجزء العلوي (Header) */
        .header-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 50px;
            font-weight: bold;
        }

        .header-info span {
            padding: 0 10px;
        }

        /* التاريخ */
        .year {
            font-size: 18px;
            margin-bottom: -10px;
            display: block;
        }

        /* الاسم الرئيسي (Malak Saad) */
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 120px;
            text-transform: uppercase;
            margin: 0;
            line-height: 0.9;
            background: linear-gradient(to bottom, #f48fb1, #ad1457);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            letter-spacing: -5px;
        }

        /* النجمة فوق الاسم */
        .main-title::after {
            content: '✦';
            position: absolute;
            top: -20px;
            right: 15%;
            font-size: 40px;
            -webkit-text-fill-color: var(--main-pink);
        }

        /* الشكل البيضاوي (الكبسولة) */
        .capsule {
            background-color: #f8bbd0;
            height: 180px;
            width: 80%;
            margin: 40px auto;
            border-radius: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .welcome-tag {
            position: absolute;
            bottom: -30px;
            font-size: 16px;
            letter-spacing: 5px;
            font-weight: bold;
        }

        /* الروابط السفلية */
        .footer-info {
            display: flex;
            justify-content: space-between;
            margin-top: 80px;
            font-size: 12px;
            font-weight: bold;
        }

        .footer-info a {
            text-decoration: none;
            color: var(--text-color);
        }

        /* استجابة الشاشات الصغيرة */
        @media (max-width: 768px) {
            .main-title { font-size: 60px; letter-spacing: -2px; }
            .header-info { font-size: 10px; flex-direction: column; gap: 10px
