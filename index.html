<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malak Saad Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Syne:wght@800&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* خلفية متدرجة تشبه الصورة */
            background: linear-gradient(180deg, #fbc2eb 0%, #ffffff 100%);
            font-family: 'Syne', sans-serif;
            color: #d81b60;
            overflow-x: hidden;
        }

        .canvas {
            width: 90%;
            max-width: 900px;
            text-align: center;
            position: relative;
            padding: 20px;
        }

        /* النصوص العلوية الصغير */
        .top-bar {
            display: flex;
            justify-content: space-between;
            font-size: clamp(10px, 2vw, 14px);
            margin-bottom: 40px;
            font-weight: bold;
            opacity: 0.8;
        }

        .year {
            font-size: 1.2rem;
            margin-bottom: 5px;
            display: block;
        }

        /* الاسم الكبير - Malak Saad */
        .name-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(40px, 10vw, 110px); /* حجم مرن يتناسب مع الشاشة */
            text-transform: uppercase;
            margin: 0;
            line-height: 0.85;
            /* تدرج لوني للنص */
            background: linear-gradient(to bottom, #ff80ab, #ad1457);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        /* المنطقة الوردية (الكبسولة) */
        .pink-capsule {
            background-color: #f48fb1;
            height: clamp(120px, 20vh, 180px);
            width: 90%;
            margin: 30px auto;
            border-radius: 100px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* كلمة WELCOME تحت الكبسولة */
        .welcome-text {
            position: absolute;
            bottom: -35px;
            font-size: 18px;
            letter-spacing: 4px;
            font-weight: 800;
            color: #ad1457;
        }

        /* النصوص السفلية */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 80px;
            font-size: clamp(9px, 1.5vw, 12px);
            font-weight: bold;
            border-top: 1px solid rgba(216, 27, 96, 0.2);
            padding-top: 10px;
        }

        /* إضافة أيقونة بسيطة في الكبسولة لتمييزها */
        .face-placeholder {
            font-size: 60px;
            filter: grayscale(1) contrast(2);
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="top-bar">
            <span>/Illustrator/</span>
            <span>/Graphic Design/</span>
            <span>/2026/</span>
        </div>

        <span class="year">/PORTFOLIO/</span>
        <h1 class="name-title">Malak Saad</h1>

        <div class="pink-capsule">
            <div class="face-placeholder">👀</div>
            <div class="welcome-text">/WELCOME/</div>
        </div>

        <div class="bottom-bar">
            <span>malak.saad@email.com</span>
            <span>behance.net/malak-saad</span>
        </div>
    </div>

</body>
</html>
