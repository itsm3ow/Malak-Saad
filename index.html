<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malak Saad Portfolio</title>
    <style>
        /* تعريف الألوان الأساسية */
        :root {
            --bg-color: #fdf2f5;
            --main-pink: #f48fb1;
            --dark-pink: #ad1457;
            --text-gray: #777;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background: linear-gradient(180deg, #fce4ec 0%, #ffffff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--dark-pink);
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 900px;
            text-align: center;
        }

        /* الشريط العلوي */
        .header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--text-gray);
        }

        .year-label {
            font-size: 14px;
            margin-bottom: 10px;
            display: block;
            letter-spacing: 3px;
        }

        /* الاسم الرئيسي MALAK SAAD */
        .main-name {
            font-size: clamp(40px, 12vw, 110px);
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            color: #ec407a;
            line-height: 1;
            letter-spacing: -2px;
        }

        /* الكبسولة الوردية الوسطى */
        .capsule-box {
            background-color: #f8bbd0;
            height: 150px;
            width: 85%;
            margin: 40px auto;
            border-radius: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(236, 64, 122, 0.1); /* إضافة حدود ناعمة */
        }

        /* رمز القطة الجديد 🐈 وحجمه */
        .cat-symbol {
            font-size: 80px; /* حجم كبير وواضح للقطة */
            /* يمكنك تغيير القطة هنا، مثلاً وجه قطة فقط: 🐱 */
        }

        /* كلمة WELCOME تحت الكبسولة */
        .welcome-label {
            position: absolute;
            bottom: -35px;
            font-weight: bold;
            letter-spacing: 5px;
            font-size: 14px;
            color: var(--dark-pink);
        }

        /* الشريط السفلي */
        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 80px;
            font-size: 10px;
            font-weight: bold;
            color: var(--text-gray);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <span>/ILLUSTRATOR/</span>
            <span>/GRAPHIC DESIGN/</span>
            <span>/2026/</span>
        </div>

        <span class="year-label">/PORTFOLIO/</span>
        
        <h1 class="main-name">MALAK SAAD</h1>

        <div class="capsule-box">
            <span class="cat-symbol">🐈</span>
            <div class="welcome-label">/WELCOME/</div>
        </div>

    </div>

</body>
</html>
