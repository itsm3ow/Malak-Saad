<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malak Saad Portfolio</title>
    <style>
        /* تعريف الألوان الأساسية */
        :root {
            --bg-color: #fdf2f5;
            --main-pink: #f48fb1;
            --dark-pink: #ad1457;
            --text-gray: #555;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            /* تدرج بسيط للخلفية */
            background: linear-gradient(180deg, #fce4ec 0%, #ffffff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--dark-pink);
        }

        .container {
            width: 90%;
            max-width: 900px;
            text-align: center;
            position: relative;
        }

        /* النصوص العلوية */
        .header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--text-gray);
        }

        .year-label {
            font-size: 16px;
            margin-bottom: 10px;
            display: block;
        }

        /* الاسم الكبير - تم تغيير طريقة التلوين لضمان الظهور */
        .main-name {
            font-size: clamp(50px, 12vw, 120px);
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            color: #ec407a; /* لون ثابت وواضح */
            line-height: 1;
            letter-spacing: -2px;
        }

        /* الشكل البيضاوي (الكبسولة) */
        .capsule-box {
            background-color: #f8bbd0;
            height: 150px;
            width: 80%;
            margin: 40px auto;
            border-radius: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
        }

        .emoji-face {
            font-size: 80px;
        }

        .welcome-label {
            position: absolute;
            bottom: -30px;
            font-weight: bold;
            letter-spacing: 5px;
            font-size: 14px;
        }

        /* الروابط السفلية */
        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 70px;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-gray);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <span>/ILLUSTRATOR/</span>
            <span>/GRAPHIC DESIGN/</span>
            <span>/2026/</span>
        </div>

        <span class="year-label">/PORTFOLIO/</span>
        
        <h1 class="main-name">MALAK SAAD</h1>

        <div class="capsule-box">
            <span class="emoji-face">👓</span>
            <div class="welcome-label">/WELCOME/</div>
        </div>

        <div class="footer">
            <span>malak.saad.design@gmail.com</span>
            <span>www.behance.net/malaksaad</span>
        </div>
    </div>

</body>
</html>
